<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>归物集</title>

<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">

<style>
:root{
  --red:#ff3b30;
  --blue:#007aff;
  --green:#34c759;
  --orange:#ff9500;
  --purple:#af52de;
  --accent:#ff2442;
  --accent-2:#ff7a90;
  --accent-gradient:linear-gradient(135deg,var(--accent),var(--accent-2));
  --control-bg:#1d1d1f;
  --control-text:#fff;
  --bg:#f5f5f7;
  --text:#1d1d1f;
  --muted:#86868b;
  --shadow:0 10px 30px rgba(0,0,0,.06);
  --card-bg:white;
  --soft-bg:#f6f6f8;
  --border:rgba(0,0,0,.04);
  --soft-text:#555;
  --soft-text-2:#777;
  --line:#ececec;
  --ease:cubic-bezier(.2,.8,.2,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --fast:160ms;
  --mid:260ms;
  --shadow-hover:0 16px 38px rgba(0,0,0,.1);
  --focus-ring:0 0 0 3px color-mix(in srgb, var(--blue) 20%, transparent);
  --cover-0:linear-gradient(135deg,#ff3b30,#ff9f0a);
  --cover-1:linear-gradient(135deg,#007aff,#5ac8fa);
  --cover-2:linear-gradient(135deg,#34c759,#30d158);
  --cover-3:linear-gradient(135deg,#ff9500,#ffd60a);
  --cover-4:linear-gradient(135deg,#5856d6,#af52de);
  --cover-5:linear-gradient(135deg,#64d2ff,#0a84ff);
  --cover-6:linear-gradient(135deg,#8e8e93,#c7c7cc);
  --chart-1:#ff2442;
  --chart-2:#007aff;
  --chart-3:#34c759;
  --chart-4:#ff9500;
  --chart-5:#af52de;
  --chart-6:#64d2ff;
  --chart-7:#8e8e93;
}

[data-theme="dark"]{
  --bg:#111214;
  --text:#f5f5f7;
  --muted:#a1a1aa;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --card-bg:#1c1c1f;
  --soft-bg:#2a2a2e;
  --border:rgba(255,255,255,.08);
  --soft-text:#d1d1d6;
  --soft-text-2:#a1a1aa;
  --line:#3a3a3f;
}

[data-style="minimal"]{
  --blue:#2563eb;
  --accent:#111827;
  --accent-2:#4b5563;
  --accent-gradient:linear-gradient(135deg,#111827,#4b5563);
  --control-bg:#111827;
  --bg:#f7f7f4;
  --card-bg:#ffffff;
  --soft-bg:#f0f0ec;
  --border:rgba(17,24,39,.08);
  --shadow:0 8px 24px rgba(17,24,39,.045);
  --shadow-hover:0 14px 34px rgba(17,24,39,.09);
  --cover-0:linear-gradient(135deg,#111827,#6b7280);
  --cover-1:linear-gradient(135deg,#334155,#94a3b8);
  --cover-2:linear-gradient(135deg,#0f766e,#99f6e4);
  --cover-3:linear-gradient(135deg,#525252,#d4d4d4);
  --cover-4:linear-gradient(135deg,#374151,#9ca3af);
  --cover-5:linear-gradient(135deg,#1f2937,#cbd5e1);
  --cover-6:linear-gradient(135deg,#71717a,#d4d4d8);
  --chart-1:#111827;
  --chart-2:#374151;
  --chart-3:#0f766e;
  --chart-4:#64748b;
  --chart-5:#a3a3a3;
  --chart-6:#2563eb;
  --chart-7:#525252;
}

[data-theme="dark"][data-style="minimal"]{
  --bg:#0f1115;
  --text:#f4f4f5;
  --muted:#a1a1aa;
  --card-bg:#181a20;
  --soft-bg:#24262d;
  --border:rgba(255,255,255,.08);
  --soft-text:#d4d4d8;
  --soft-text-2:#a1a1aa;
  --line:#30333b;
  --shadow:0 10px 30px rgba(0,0,0,.34);
}

[data-style="cute"]{
  --red:#ff5c8a;
  --blue:#7c83ff;
  --accent:#ff6b9d;
  --accent-2:#ffc6dc;
  --accent-gradient:linear-gradient(135deg,#ff6b9d,#ffc6dc);
  --control-bg:#ff6b9d;
  --bg:#fff7fb;
  --text:#382934;
  --muted:#a77991;
  --card-bg:#fff;
  --soft-bg:#fff0f7;
  --border:rgba(255,107,157,.16);
  --soft-text:#705266;
  --soft-text-2:#9b7189;
  --line:#ffe0ee;
  --shadow:0 12px 30px rgba(255,107,157,.12);
  --shadow-hover:0 18px 40px rgba(255,107,157,.18);
  --cover-0:linear-gradient(135deg,#ff6b9d,#ffd1e3);
  --cover-1:linear-gradient(135deg,#8b8cff,#c7d2fe);
  --cover-2:linear-gradient(135deg,#6ee7b7,#d9f99d);
  --cover-3:linear-gradient(135deg,#fbbf24,#fde68a);
  --cover-4:linear-gradient(135deg,#c084fc,#f0abfc);
  --cover-5:linear-gradient(135deg,#67e8f9,#bae6fd);
  --cover-6:linear-gradient(135deg,#f9a8d4,#fecaca);
  --chart-1:#ff6b9d;
  --chart-2:#8b8cff;
  --chart-3:#22c55e;
  --chart-4:#f59e0b;
  --chart-5:#c084fc;
  --chart-6:#06b6d4;
  --chart-7:#fb7185;
}

[data-theme="dark"][data-style="cute"]{
  --bg:#201820;
  --text:#fff4fa;
  --muted:#d8a9c2;
  --card-bg:#2b202b;
  --soft-bg:#3a2a38;
  --border:rgba(255,198,220,.14);
  --soft-text:#f1c8dc;
  --soft-text-2:#d8a9c2;
  --line:#463040;
  --shadow:0 12px 30px rgba(0,0,0,.32);
}

[data-style="glass"]{
  --blue:#0ea5e9;
  --accent:#0ea5e9;
  --accent-2:#a78bfa;
  --accent-gradient:linear-gradient(135deg,#0ea5e9,#a78bfa);
  --control-bg:#0f172a;
  --bg:#eef7ff;
  --text:#0f172a;
  --muted:#64748b;
  --card-bg:rgba(255,255,255,.72);
  --soft-bg:rgba(255,255,255,.52);
  --border:rgba(14,165,233,.18);
  --soft-text:#334155;
  --soft-text-2:#64748b;
  --line:rgba(15,23,42,.08);
  --shadow:0 18px 45px rgba(14,165,233,.12);
  --shadow-hover:0 22px 54px rgba(14,165,233,.2);
  --cover-0:linear-gradient(135deg,#0ea5e9,#a78bfa);
  --cover-1:linear-gradient(135deg,#38bdf8,#818cf8);
  --cover-2:linear-gradient(135deg,#2dd4bf,#86efac);
  --cover-3:linear-gradient(135deg,#f59e0b,#fde68a);
  --cover-4:linear-gradient(135deg,#8b5cf6,#f0abfc);
  --cover-5:linear-gradient(135deg,#06b6d4,#bfdbfe);
  --cover-6:linear-gradient(135deg,#64748b,#cbd5e1);
  --chart-1:#0ea5e9;
  --chart-2:#8b5cf6;
  --chart-3:#14b8a6;
  --chart-4:#f59e0b;
  --chart-5:#ec4899;
  --chart-6:#38bdf8;
  --chart-7:#64748b;
}

[data-theme="dark"][data-style="glass"]{
  --bg:#08111f;
  --text:#eff6ff;
  --muted:#93a4b8;
  --card-bg:rgba(15,23,42,.72);
  --soft-bg:rgba(30,41,59,.58);
  --border:rgba(125,211,252,.16);
  --soft-text:#dbeafe;
  --soft-text-2:#9db0c6;
  --line:rgba(226,232,240,.1);
  --shadow:0 18px 45px rgba(0,0,0,.38);
}

[data-style="soft"]{
  --blue:#6d5dfc;
  --accent:#6d5dfc;
  --accent-2:#8bd3dd;
  --accent-gradient:linear-gradient(135deg,#6d5dfc,#8bd3dd);
  --control-bg:#5b54d6;
  --bg:#eef0f7;
  --text:#23243a;
  --muted:#73768c;
  --card-bg:#f8f9ff;
  --soft-bg:#eef0f7;
  --border:rgba(87,92,128,.08);
  --soft-text:#54576c;
  --soft-text-2:#73768c;
  --line:#dde1ee;
  --shadow:8px 8px 20px rgba(143,151,179,.18), -8px -8px 20px rgba(255,255,255,.75);
  --shadow-hover:10px 12px 28px rgba(143,151,179,.24), -8px -8px 22px rgba(255,255,255,.82);
  --cover-0:linear-gradient(135deg,#6d5dfc,#8bd3dd);
  --cover-1:linear-gradient(135deg,#5b8def,#b8c0ff);
  --cover-2:linear-gradient(135deg,#56c596,#c7f9cc);
  --cover-3:linear-gradient(135deg,#f4a261,#ffe8a3);
  --cover-4:linear-gradient(135deg,#9b5de5,#f15bb5);
  --cover-5:linear-gradient(135deg,#00bbf9,#98f5e1);
  --cover-6:linear-gradient(135deg,#8d99ae,#edf2f4);
  --chart-1:#6d5dfc;
  --chart-2:#00bbf9;
  --chart-3:#56c596;
  --chart-4:#f4a261;
  --chart-5:#9b5de5;
  --chart-6:#8bd3dd;
  --chart-7:#8d99ae;
}

[data-theme="dark"][data-style="soft"]{
  --bg:#171923;
  --text:#f3f4ff;
  --muted:#a6abc2;
  --card-bg:#202332;
  --soft-bg:#2a2e3f;
  --border:rgba(255,255,255,.08);
  --soft-text:#d7daf0;
  --soft-text-2:#a6abc2;
  --line:#34394d;
  --shadow:0 12px 30px rgba(0,0,0,.34);
}

*{box-sizing:border-box}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-bottom:calc(108px + env(safe-area-inset-bottom));
  transition:background var(--mid) var(--ease),color var(--mid) var(--ease);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overscroll-behavior-y:contain;
}

body.no-scroll{overflow:hidden}

button,
input,
select,
textarea{
  -webkit-tap-highlight-color:transparent;
}

input,
select,
textarea{
  min-height:46px;
}

button{
  font:inherit;
  cursor:pointer;
  transition:
    transform var(--fast) var(--ease),
    background-color var(--fast) var(--ease),
    color var(--fast) var(--ease),
    border-color var(--fast) var(--ease),
    box-shadow var(--fast) var(--ease),
    opacity var(--fast) var(--ease);
}

button:active{
  transform:scale(.97);
}

button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible{
  outline:none;
  box-shadow:var(--focus-ring);
}

header{
  position:sticky;
  top:0;
  z-index:10;
  background:color-mix(in srgb, var(--card-bg) 86%, transparent);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  padding:14px 14px 10px;
  border-bottom:1px solid var(--border);
  transition:background var(--mid) var(--ease), border-color var(--mid) var(--ease);
}

.top{
  max-width:980px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.logo{
  font-size:23px;
  font-weight:900;
  letter-spacing:0;
}

.manage-btn{
  border:none;
  background:var(--control-bg);
  color:var(--control-text);
  border-radius:999px;
  padding:10px 14px;
  font-weight:700;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  min-height:44px;
}

.toolbar{
  max-width:980px;
  margin:12px auto 0;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
}

.toolbar-actions{
  display:flex;
  align-items:center;
  gap:10px;
}

.search-wrap{
  position:relative;
  min-width:0;
  width:100%;
}

.search-icon{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:17px;
  font-weight:700;
  line-height:1;
  pointer-events:none;
  z-index:2;
}

.search{
  position:relative;
  z-index:1;
  width:100%;
  border:1px solid var(--border);
  background:color-mix(in srgb, var(--soft-bg) 92%, white);
  color:var(--text);
  -webkit-text-fill-color:var(--text);
  caret-color:var(--blue);
  border-radius:999px;
  padding:12px 16px 12px 42px;
  outline:none;
  line-height:1.2;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.35),
    0 4px 14px rgba(0,0,0,.04);
  transition:
    background var(--fast) var(--ease),
    border-color var(--fast) var(--ease),
    box-shadow var(--fast) var(--ease);
}

.search:focus{
  background:var(--card-bg);
  color:var(--text);
  -webkit-text-fill-color:var(--text);
  border-color:color-mix(in srgb, var(--blue) 38%, var(--border));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.25),
    0 0 0 3px color-mix(in srgb, var(--blue) 18%, transparent),
    0 10px 24px rgba(0,0,0,.08);
}

.search::placeholder{
  color:var(--muted);
}

input.search{
  padding:12px 16px 12px 42px;
  background:color-mix(in srgb, var(--soft-bg) 92%, white);
  color:var(--text);
  -webkit-text-fill-color:var(--text);
}

input.search:focus{
  background:var(--card-bg);
  color:var(--text);
  -webkit-text-fill-color:var(--text);
}

.sort-select{
  border:none;
  background:var(--card-bg);
  border-radius:999px;
  padding:11px 14px;
  outline:none;
  color:var(--text);
  font-size:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.05);
  max-width:160px;
  transition:box-shadow var(--fast) var(--ease), background var(--fast) var(--ease);
}

.view-toggle{
  display:none;
  align-items:center;
  gap:4px;
  padding:4px;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:999px;
  box-shadow:0 4px 14px rgba(0,0,0,.05);
}

.view-toggle button{
  border:none;
  background:transparent;
  color:var(--soft-text);
  border-radius:999px;
  min-width:54px;
  height:34px;
  padding:0 12px;
  font-size:13px;
  font-weight:800;
}

.view-toggle button.active{
  background:var(--control-bg);
  color:var(--control-text);
}

.tabs-wrap{
  max-width:980px;
  margin:12px auto 0;
  overflow:auto;
  scrollbar-width:none;
}

.tabs-wrap::-webkit-scrollbar{
  display:none;
}

.tabs{
  display:flex;
  gap:10px;
  width:max-content;
}

.tab{
  border:none;
  white-space:nowrap;
  background:var(--card-bg);
  color:var(--soft-text);
  border-radius:999px;
  padding:8px 14px;
  box-shadow:0 4px 14px rgba(0,0,0,.04);
  transition:transform var(--fast) var(--ease), background var(--fast) var(--ease), color var(--fast) var(--ease), box-shadow var(--fast) var(--ease);
}

.tab.active{
  background:var(--control-bg);
  color:var(--control-text);
}

main{
  max-width:980px;
  margin:auto;
  padding:14px;
}

.page{display:none}
.page.active{
  display:block;
  animation:pageIn var(--mid) var(--ease-out);
}

.hero,
.mine-card,
.dark-card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:28px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
  transition:background var(--mid) var(--ease), border-color var(--mid) var(--ease), box-shadow var(--mid) var(--ease), transform var(--mid) var(--ease);
}

.hero-title,
.mine-title,
.section-title{
  font-size:21px;
  font-weight:900;
  letter-spacing:0;
  margin-bottom:14px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.stat,
.mine-stat{
  background:var(--soft-bg);
  border:1px solid var(--border);
  border-radius:20px;
  padding:14px;
}

.stat.clickable{
  cursor:pointer;
  transition:transform var(--fast) var(--ease), background var(--fast) var(--ease), box-shadow var(--fast) var(--ease);
}

.stat.clickable:active{
  transform:scale(.97);
}

.stat.active-filter{
  background:color-mix(in srgb, var(--red) 14%, var(--soft-bg));
}

.stat span,
.mine-stat span{
  display:block;
  color:var(--muted);
  font-size:12px;
}

.stat b,
.mine-stat b{
  display:block;
  margin-top:5px;
  font-size:22px;
  letter-spacing:0;
}

.list-status{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:0 0 12px;
  color:var(--soft-text-2);
  font-size:13px;
  font-weight:800;
}

.list-status span{
  min-width:0;
}

.list-status button{
  display:none;
  border:none;
  border-radius:999px;
  background:var(--soft-bg);
  color:var(--text);
  padding:8px 13px;
  min-height:38px;
  font-size:13px;
  font-weight:800;
  white-space:nowrap;
}

.list-status.has-filter button{
  display:block;
}

.masonry{
  columns:2 220px;
  column-gap:12px;
}

.card{
  break-inside:avoid;
  page-break-inside:avoid;
  display:block;
  width:100%;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:22px;
  overflow:hidden;
  box-shadow:var(--shadow);
  cursor:pointer;
  margin:0 0 12px;
  transition:
    transform var(--mid) var(--ease),
    box-shadow var(--mid) var(--ease),
    border-color var(--mid) var(--ease),
    background var(--mid) var(--ease);
}


.card:active{transform:scale(.985)}


.cover{
  min-height:96px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:white;
  overflow:hidden;
  position:relative;
  z-index:0;
  transition:filter var(--mid) var(--ease), transform var(--mid) var(--ease);
}

.cover.emoji-cover{
  height:112px;
}

.cover.has-custom-bg{
  background:var(--item-bg);
}

.cover-0{background:var(--cover-0)}
.cover-1{background:var(--cover-1)}
.cover-2{background:var(--cover-2)}
.cover-3{background:var(--cover-3)}
.cover-4{background:var(--cover-4)}
.cover-5{background:var(--cover-5)}
.cover-6{background:var(--cover-6)}

.card-body{
  position:relative;
  z-index:2;
  display:block;
  background:var(--card-bg);
  padding:13px;
  border-top:1px solid var(--border);
  transition:background var(--mid) var(--ease), border-color var(--mid) var(--ease);
}

.name{
  font-weight:800;
  margin-bottom:6px;
  line-height:1.35;
}

.meta{
  color:var(--soft-text-2);
  font-size:12px;
  line-height:1.7;
}

.card-note{
  margin-top:8px;
  color:var(--soft-text);
  font-size:12px;
  line-height:1.6;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.price{
  margin-top:8px;
  font-weight:900;
  color:var(--text);
  letter-spacing:0;
}

.badge{
  display:inline-block;
  margin-top:8px;
  padding:4px 9px;
  border-radius:999px;
  font-size:12px;
}

.value-badge{
  display:inline-block;
  margin-top:8px;
  margin-right:6px;
  padding:4px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
}

.value-super{background:#e8f8ee;color:#16803c}
.value-good{background:#eaf4ff;color:#0066cc}
.value-mid{background:#fff3d8;color:#9a6500}

.value-low{background:#ffe4e8;color:#d7002a}

.tag-list{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:8px;
}

.item-tag{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:4px 10px;
  border-radius:999px;
  background:var(--soft-bg);
  color:var(--soft-text, #555);
  font-size:11px;
  font-weight:800;
}

.tag-input-wrap{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.tag-create-row{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.tag-create-row input{
  flex:1;
}

.tag-create-row button{
  border:none;
  border-radius:14px;
  background:var(--control-bg);
  color:var(--control-text);
  padding:0 16px;
  font-weight:800;
}


.tag-chip{
  padding:8px 12px;
  border-radius:999px;
  background:var(--soft-bg);

  .primary:hover,

  .card:hover,

  .color-field button:hover,
  .tag-chip:hover{
    background:color-mix(in srgb, var(--soft-bg) 72%, var(--blue) 8%);
  }

  .list-action:hover{
    background:var(--soft-bg);
    transform:translateX(2px);
  }
}

@media(prefers-reduced-motion:reduce){
  *,
  *::before,
  *::after{
    animation-duration:.01ms !important;
    animation-iteration-count:1 !important;
    scroll-behavior:auto !important;
    transition-duration:.01ms !important;
  }
}

@keyframes pageIn{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@media(max-width:760px){
  .asset-layout{
    grid-template-columns:1fr;
  }
  .donut-wrap{
    width:220px;
    height:220px;
  }
  .donut-wrap canvas{
    width:220px;
    height:220px;
  }
}

@media(max-width:520px){
  .toolbar{
    grid-template-columns:1fr;
  }
  .toolbar-actions{
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    gap:10px;
  }
  .view-toggle{
    display:flex;
  }
  .highlight-grid,
  .time-grid,
  .life-grid{
    grid-template-columns:1fr;
  }
  .search{
    min-width:0;
  }
  .sort-select{
    width:100%;
    max-width:none;
  }
  .stats{
    grid-template-columns:1fr 1fr;
  }
  .masonry{
    columns:1;
  }
  [data-mobile-columns="2"] .masonry{
    columns:2;
    column-gap:10px;
  }
  [data-mobile-columns="2"] .card{
    border-radius:18px;
    margin-bottom:10px;
  }
  [data-mobile-columns="2"] .cover.emoji-cover{
    height:88px;
    font-size:32px;
  }
  [data-mobile-columns="2"] .card-body{
    padding:10px;
  }
  [data-mobile-columns="2"] .name{
    font-size:14px;
  }
  [data-mobile-columns="2"] .meta,
  [data-mobile-columns="2"] .card-note{
    font-size:11px;
  }
  [data-mobile-columns="2"] .price{
    font-size:13px;
  }
  [data-mobile-columns="2"] .actions{

  }
  [data-mobile-columns="2"] .actions button{

  .stat:last-child{
    grid-column:1/3;

  .modal{
    display:flex;
    align-items:flex-end;
    padding:0;

  .sheet{

    max-width:none;
    max-height:min(88vh,760px);

    overflow:auto;
    border-radius:28px 28px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));

  }
}
</style>
</head>

<body>

<header id="mainHeader">
  <div class="top">
    <div class="logo" id="pageTitle">我的物品</div>
    <button class="manage-btn" onclick="openCategoryModal()" aria-label="打开分类管理">分类</button>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search" class="search" placeholder="搜索物品" aria-label="搜索物品" />
    </div>
    <div class="toolbar-actions">
      <select id="sortSelect" class="sort-select" title="排序方式">
        <option value="newest">最新添加</option>
        <option value="oldest">最早添加</option>

        <option value="dailyAsc">日均从低到高</option>

  <div class="tabs-wrap" id="tabsWrap">

  </div>
</header>

<main>
  <section id="homePage" class="page active">
    <section class="hero">
      <div class="hero-title">今天也要认真使用每一件物品</div>
      <div class="stats">
        <div class="stat"><span>物品数</span><b id="count">0</b></div>
        <div class="stat"><span>总花费</span><b id="total">¥0</b></div>
        <div class="stat"><span>平均日均</span><b id="avg">¥0/天</b></div>
        <div class="stat clickable" id="expireFilterCard" onclick="toggleExpireFilter()"><span>过期提醒</span><b id="expireSoonCount">0</b></div>
      </div>

    <div id="listStatus" class="list-status" aria-live="polite">

        <div class="asset-layout">

            <div class="list-icon">🌗</div>

        </div>

            <div class="list-icon">🎨</div>

          </div>
          <select id="styleSelect" class="theme-select" onchange="setVisualStyle(this.value)" onclick="event.stopPropagation()">

<button class="fab" id="fab" onclick="openItemModal()" aria-label="添加物品">+</button>

<nav class="bottom-nav" aria-label="主要导航">

<div class="modal" id="itemModal" role="dialog" aria-modal="true" aria-labelledby="formTitle">

      <input type="hidden" id="editId">

      <select id="category"></select>
      <div class="appearance-grid">

          <small>物品图标</small>

        <label class="color-field">
          <small>封面背景色</small>
          <input id="itemBgColor" type="color" value="#007aff">
          <button type="button" onclick="clearItemBgColor()">默认</button>
        </label>
      </div>
      <input type="hidden" id="itemBgColorCustom">
      <input id="price" type="number" step="0.01" min="0" placeholder="价格 / 元" required>
      <input id="paybackTarget" type="number" step="0.01" min="0.01" placeholder="回本目标日均 / 元，默认 1">
      <select id="lifeStatus">
        <option value="auto">自动判断</option>
        <option value="active">使用中</option>
        <option value="idle">闲置</option>
        <option value="retired">已淘汰</option>
      </select>

      <label>
        <small>购买日期</small>
        <input id="buyDate" type="date" required>
      </label>

      <label>
        <small>停止使用日期，可不填</small>
        <input id="endDate" type="date">
      </label>

      <label>
        <small>保质期 / 有效期，可不填</small>
        <input id="expireDate" type="date">
      </label>

      <div class="tag-create-row">
        <input id="newTagInput" placeholder="自定义标签，例如：已回本">
        <button type="button" onclick="addCustomTag()">添加</button>

      <textarea id="note" placeholder="备注：购买渠道、使用感受、是否回购等" style="min-height:100px;resize:vertical"></textarea>

<div class="modal" id="categoryModal" role="dialog" aria-modal="true" aria-labelledby="categoryModalTitle">

      <div class="add-category">
        <input id="newCategory" placeholder="新分类名称，例如：护肤品">
        <button onclick="addCategory()">添加</button>
      </div>
      <div id="categoryList" class="grid"></div>
      <button class="primary" onclick="saveCategories()">保存分类</button>
      <button class="secondary" onclick="closeCategoryModal()">取消</button>
    </div>
  </div>

<script>
const ITEM_KEY="items_xhs_style_v7";
const CAT_KEY="items_categories_v7";
const CAT_ICON_KEY="items_category_icons_v7";
const THEME_KEY="items_theme_v1";
const STYLE_KEY="items_visual_style_v1";
const TAG_KEY="items_custom_tags_v1";
const MOBILE_COLUMNS_KEY="items_mobile_columns_v1";

let items=JSON.parse(localStorage.getItem(ITEM_KEY)||"[]");
let categories=JSON.parse(localStorage.getItem(CAT_KEY)||"null") || [
  "电子产品","衣服鞋包","美妆护肤","药品","日用品","书籍","其他"
];
let categoryIcons=JSON.parse(localStorage.getItem(CAT_ICON_KEY)||"null") || {};

let activeCat="全部";
let currentPage="home";
let sortMode="newest";
let expireOnly=false;
let currentTheme=localStorage.getItem(THEME_KEY) || "light";
let currentStyle=localStorage.getItem(STYLE_KEY) || "xhs";
let mobileColumns=localStorage.getItem(MOBILE_COLUMNS_KEY) || "1";
let customTags=JSON.parse(localStorage.getItem(TAG_KEY)||"null") || [
  "高频使用","收藏","回购","实验室","出差"
];

const fallbackColors=["#ff2442","#007aff","#34c759","#ff9500","#af52de","#64d2ff","#8e8e93"];
const visualStyles=["xhs","minimal","cute","glass","soft"];

if(!visualStyles.includes(currentStyle)){
  currentStyle="xhs";
}

const icons={
  "日用品":"🧴",
  "化妆品":"💄",
  "药品":"💊",
  "电子产品":"🖥️",
  "衣物":"👕",
  "衣服鞋包":"👒",
  "书籍":"📚",
  "其他":"🛁",
  "护肤品":"🧼",
  "美妆护肤":"💄",
  "食品":"🍪",
  "文具":"✏️",
  "家居":"🏠",
  "健身":"🏋️"
};

const $=id=>document.getElementById(id);
const today=()=>new Date(new Date().toDateString());
const money=n=>"¥"+Number(n||0).toFixed(2);

function removeImageData(list){
  return list.map(({image,...item})=>item);
}

items=removeImageData(items);

function saveItems(){
  localStorage.setItem(ITEM_KEY,JSON.stringify(items));
}

function saveCats(){
  localStorage.setItem(CAT_KEY,JSON.stringify(categories));
  localStorage.setItem(CAT_ICON_KEY,JSON.stringify(categoryIcons));
}

function daysBetween(a,b){
  const d1=new Date(a);
  if(Number.isNaN(d1.getTime()))return 1;
  const d2=b?new Date(b):today();
  if(Number.isNaN(d2.getTime()))return 1;
  return Math.max(1,Math.ceil((d2-d1)/86400000)+1);
}

function expireInfo(date){
  if(!date)return null;
  const diff=Math.ceil((new Date(date)-today())/86400000);
  if(diff<0)return {text:"已过期",cls:"bad"};
  if(diff<=30)return {text:`${diff} 天后过期`,cls:"warn"};
  return {text:"有效期内",cls:"ok"};
}

function valueInfo(item){
  const price=Number(item.price || 0);
  const days=daysBetween(item.buyDate,item.endDate);
  const daily=price / days;

  if(!price)return {text:"未计价",cls:"value-mid",score:0,daily};
  if(daily<=1)return {text:"超值",cls:"value-super",score:4,daily};
  if(daily<=3)return {text:"很值",cls:"value-good",score:3,daily};
  if(daily<=10)return {text:"一般",cls:"value-mid",score:2,daily};
  return {text:"偏贵",cls:"value-low",score:1,daily};
}

function paybackInfo(item){
  const price=Number(item.price || 0);
  const targetDaily=Number(item.paybackTarget || 1);
  const days=daysBetween(item.buyDate,item.endDate);
  const daily=price/days;

  if(price<=0 || targetDaily<=0)return {
    done:false,
    text:"未计价",
    progress:0,
    targetDays:0,
    days,
    remain:0,
    targetDaily
  };

  const targetDays=Math.ceil(price/targetDaily);
  const progress=Math.min(100,days/targetDays*100);

  if(daily<=targetDaily){
    return {
      done:true,
      text:`已达成 ${money(targetDaily)}/天目标`,
      progress:100,
      targetDays,
      days,
      remain:0,
      targetDaily
    };
  }

  const remain=Math.max(0,targetDays-days);

  return {
    done:false,
    text:`距离 ${money(targetDaily)}/天还需 ${remain} 天`,
    progress,
    targetDays,
    days,
    remain,
    targetDaily
  };
}

function paybackProgressHtml(info){
  const progress=Math.max(0,Math.min(100,Number(info.progress || 0)));
  return `
    <div class="payback-progress" aria-label="回本进度 ${progress.toFixed(0)}%">
      <i style="width:${progress}%"></i>
    </div>
  `;
}

function epitaphInfo(item){
  const life=computedLifeInfo(item);
  if(life.text!=="已淘汰")return null;

  const days=daysBetween(item.buyDate,item.endDate);
  const daily=Number(item.price || 0)/days;
  const value=valueInfo(item);
  const payback=paybackInfo(item);
  const exp=expireInfo(item.expireDate);
  const reason=item.endDate ? "它已经完成了这段使用周期" : exp?.cls==="bad" ? "它因为过期正式退场" : "它被你标记为已淘汰";
  const paybackText=payback.done ? "回本目标已经完成" : `回本进度停在 ${payback.progress.toFixed(0)}%`;

  return {
    title:`${getItemIcon(item)} ${item.name} 的物品墓志铭`,
    text:`${reason}。它陪你 ${days} 天，最终日均成本 ${money(daily)}/天，${paybackText}，使用价值评价是「${value.text}」。`
  };
}

function declutterInfo(item){
  const days=daysBetween(item.buyDate,item.endDate);
  const daily=Number(item.price || 0)/days;
  const price=Number(item.price || 0);
  const life=computedLifeInfo(item);
  const value=valueInfo(item);
  const payback=paybackInfo(item);
  const exp=expireInfo(item.expireDate);
  let score=0;
  const reasons=[];

  if(life.text==="已淘汰"){
    score+=48;
    reasons.push("已淘汰");
  }
  if(life.text==="闲置"){
    score+=34;
    reasons.push("可能闲置");
  }
  if(exp?.cls==="bad"){
    score+=28;
    reasons.push("已过期");
  }
  if(days>=180 && daily>10){
    score+=24;
    reasons.push("使用很久但日均仍高");
  }
  if(days>=90 && !payback.done){
    score+=16;
    reasons.push(`回本 ${payback.progress.toFixed(0)}%`);
  }
  if(value.score<=1 && price>0){
    score+=14;
    reasons.push("成本偏高");
  }
  if(price>=500 && daily>5){
    score+=10;
    reasons.push("金额较大");
  }

  return {
    item,
    score,
    reasons:[...new Set(reasons)],
    daily,
    days
  };
}

function getDeclutterCandidates(){
  return items
    .map(declutterInfo)
    .filter(x=>x.score>=25)
    .sort((a,b)=>b.score-a.score || Number(b.item.price||0)-Number(a.item.price||0))
    .slice(0,6);
}


function lifeInfo(status){
  if(status==="idle")return {text:"闲置",cls:"life-idle"};
  if(status==="retired")return {text:"已淘汰",cls:"life-retired"};
  return {text:"使用中",cls:"life-active"};
}

function computedLifeInfo(item){
  if(item.lifeStatus && item.lifeStatus!=="auto"){
    return lifeInfo(item.lifeStatus);
  }

  const exp=expireInfo(item.expireDate);
  if(item.endDate || (exp && exp.cls==="bad")){
    return lifeInfo("retired");
  }

  const days=daysBetween(item.buyDate,item.endDate);
  const daily=Number(item.price || 0)/days;

  if(days>=180 && daily>10){
    return lifeInfo("idle");
  }

  return lifeInfo("active");
}

function formatDate(dateStr){
  if(!dateStr)return "—";
  const d=new Date(dateStr);
  if(Number.isNaN(d.getTime()))return dateStr;
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
}

function buildTimeline(item){
  const days=daysBetween(item.buyDate,item.endDate);
  const exp=expireInfo(item.expireDate);
  const life=computedLifeInfo(item);
  const result=[];

  if(item.buyDate){
    result.push({
      title:"购买",
      desc:`${formatDate(item.buyDate)} · 花费 ${money(item.price)}`,
      cls:""
    });
  }

  result.push({
    title:`已使用 ${days} 天`,
    desc:`当前日均成本 ${money(Number(item.price||0)/days)}/天 · 使用价值：${valueInfo(item).text}`,
    cls:""
  });

  if(item.expireDate){
    result.push({
      title:exp && exp.cls==="bad" ? "已过期" : "保质期",
      desc:`${formatDate(item.expireDate)}${exp ? ` · ${exp.text}` : ""}`,
      cls:exp ? exp.cls : ""
    });
  }

  if(item.endDate){
    result.push({
      title:"停止使用",
      desc:`${formatDate(item.endDate)} · 生命周期：${life.text}`,
      cls:"done"
    });
  }else{
    result.push({
      title:"当前状态",
      desc:`生命周期：${life.text}`,
      cls:life.text==="闲置" ? "warn" : life.text==="已淘汰" ? "done" : ""
    });
  }

  return result;
}

function getIcon(cat){
  return categoryIcons[cat] || icons[cat] || "✨";
}

function getItemIcon(item){
  return item.icon || getIcon(item.category);
}

function coverClass(cat){
  return "cover-" + (Math.abs(cat.length) % 7);
}

function normalizeColor(color){
  const value=String(color || "").trim();
  return /^#[0-9a-fA-F]{6}$/.test(value) ? value : "";
}

function itemCoverClass(item){
  return normalizeColor(item.bgColor) ? "has-custom-bg" : coverClass(item.category);
}

function itemCoverStyle(item){
  const color=normalizeColor(item.bgColor);
  return color ? ` style="--item-bg:linear-gradient(135deg,${color},color-mix(in srgb, ${color} 62%, white))"` : "";
}

function getThemeColors(){
  const styles=getComputedStyle(document.documentElement);
  return fallbackColors.map((color,index)=>styles.getPropertyValue(`--chart-${index+1}`).trim() || color);
}

function sortItems(a,b){
  const priceA=Number(a.price||0);
  const priceB=Number(b.price||0);
  const daysA=daysBetween(a.buyDate,a.endDate);
  const daysB=daysBetween(b.buyDate,b.endDate);
  const dailyA=priceA/daysA;
  const dailyB=priceB/daysB;
  const expireA=a.expireDate ? new Date(a.expireDate).getTime() : Infinity;
  const expireB=b.expireDate ? new Date(b.expireDate).getTime() : Infinity;

  if(sortMode==="oldest") return items.indexOf(a)-items.indexOf(b);
  if(sortMode==="priceDesc") return priceB-priceA;
  if(sortMode==="priceAsc") return priceA-priceB;
  if(sortMode==="dailyDesc") return dailyB-dailyA;
  if(sortMode==="dailyAsc") return dailyA-dailyB;
  if(sortMode==="daysDesc") return daysB-daysA;
  if(sortMode==="daysAsc") return daysA-daysB;
  if(sortMode==="expireAsc") return expireA-expireB;

  return items.indexOf(b)-items.indexOf(a);
}

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

    return {
      cat,
      count:list.length,
      amount,
      percent,
      color:colors[index % colors.length]
    };
  }).filter(x=>x.count>0 || x.amount>0)
    .sort((a,b)=>b.amount-a.amount);
}

function renderTimeStats(){
  const monthSpendEl=$("monthSpend");
  const recentSpendEl=$("recentSpend");
  const yearSpendEl=$("yearSpend");
  const monthBarsEl=$("monthBars");
  if(!monthSpendEl || !recentSpendEl || !yearSpendEl || !monthBarsEl)return;

  const now=today();
  const year=now.getFullYear();
  const month=now.getMonth();
  const monthStart=new Date(year,month,1);
  const yearStart=new Date(year,0,1);
  const recentStart=new Date(now);
  recentStart.setDate(recentStart.getDate()-29);

  const amountAfter=start=>items.reduce((sum,item)=>{
    if(!item.buyDate)return sum;
    const d=new Date(item.buyDate);
    return d>=start ? sum+Number(item.price||0) : sum;
  },0);

  monthSpendEl.textContent=money(amountAfter(monthStart));
  recentSpendEl.textContent=money(amountAfter(recentStart));
  yearSpendEl.textContent=money(amountAfter(yearStart));

  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(year,month-i,1);
    const y=d.getFullYear();
    const m=d.getMonth();
    const label=`${m+1}月`;
    const amount=items.reduce((sum,item)=>{
      if(!item.buyDate)return sum;
      const bd=new Date(item.buyDate);
      return bd.getFullYear()===y && bd.getMonth()===m ? sum+Number(item.price||0) : sum;
    },0);
    months.push({label,amount});
  }

  const max=Math.max(...months.map(x=>x.amount),1);

  monthBarsEl.innerHTML=months.map(x=>`
    <div class="month-row">
      <div class="month-label">${x.label}</div>
      <div class="month-track"><div class="month-fill" style="width:${Math.max(4,x.amount/max*100)}%"></div></div>
      <div class="month-money">${money(x.amount)}</div>
    </div>
  `).join("");
}

function drawDonut(stats,total){
  const canvas=$("donutCanvas");
  if(!canvas)return;

  const ctx=canvas.getContext("2d");
  const w=canvas.width;
  const h=canvas.height;
  const cx=w/2;
  const cy=h/2;
  const radius=170;
  const lineWidth=70;

  ctx.clearRect(0,0,w,h);
  ctx.lineWidth=lineWidth;
  ctx.lineCap="butt";

  if(!total){
    ctx.beginPath();
    ctx.strokeStyle="#ececec";
    ctx.arc(cx,cy,radius,0,Math.PI*2);
    ctx.stroke();
    return;
  }

  let start=-Math.PI/2;

  stats.forEach(s=>{
    const angle=Math.PI*2*(s.amount/total);
    ctx.beginPath();
    ctx.strokeStyle=s.color;
    ctx.arc(cx,cy,radius,start,start+angle);
    ctx.stroke();
    start+=angle;
  });
}

  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importBackup(event){
  const file=event.target.files[0];
  if(!file)return;

  const reader=new FileReader();

  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);

      if(!Array.isArray(data.items) || !Array.isArray(data.categories)){
        alert("备份文件格式不正确");
        return;
      }

      if(!confirm("导入后会覆盖当前数据，确定继续吗？"))return;

      items=removeImageData(data.items);
      categories=data.categories;
      categoryIcons=data.categoryIcons || {};
      customTags=data.customTags || customTags;
      activeCat="全部";

      saveItems();
      saveCats();
      saveTags();
      render();
      renderMinePage();

      alert("导入成功");
    }catch(e){
      alert("导入失败，请检查 JSON 文件");
    }finally{
      event.target.value="";
    }
  };

  reader.readAsText(file);
}

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="chart-title" style="margin-bottom:0">日均成本变化曲线</div>
        <button onclick="editFromDetail('${x.id}')" style="border:none;background:var(--control-bg);color:var(--control-text);border-radius:12px;padding:8px 14px;font-weight:700">编辑</button>
      </div>
      <canvas id="costChart" width="900" height="460"></canvas>
    </div>

    <div class="timeline-box">
      <div class="timeline-title">物品时间轴</div>
      <div class="timeline-list">
        ${timeline.map(t=>`
          <div class="timeline-item ${t.cls}">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
              <b>${escapeHtml(t.title)}</b>

            </div>
          </div>

    </div>

    ${epitaph ? `
      <div class="epitaph-box">
        <div class="epitaph-title">${escapeHtml(epitaph.title)}</div>
        <div class="epitaph-text">${escapeHtml(epitaph.text)}</div>

    ` : ``}

    ${x.note ? `
      <div class="detail-note">${escapeHtml(x.note)}</div>
    ` : ``}
  `;

  showModal("detailModal");
  requestAnimationFrame(()=>{
    drawCostChart(x.price,days);
  });
}

function drawCostChart(price,days){
  const canvas=$("costChart");
  if(!canvas)return;

  const ctx=canvas.getContext("2d");
  const w=canvas.width;
  const h=canvas.height;
  const pad=54;

  ctx.clearRect(0,0,w,h);

  const maxY=price;
  const minY=price/days;

  ctx.lineWidth=2;
  ctx.strokeStyle="#e5e5e5";

  for(let i=0;i<=4;i++){
    const y=pad+(h-2*pad)*i/4;
    ctx.beginPath();
    ctx.moveTo(pad,y);
    ctx.lineTo(w-pad,y);
    ctx.stroke();
  }

  ctx.strokeStyle="#007aff";
  ctx.lineWidth=5;
  ctx.beginPath();

  for(let d=1;d<=days;d++){
    const x=pad+(w-2*pad)*(d-1)/Math.max(1,days-1);
    const value=price/d;
    const y=pad+(h-2*pad)*(maxY-value)/Math.max(1,maxY-minY);

    if(d===1)ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }

  ctx.stroke();

  const currentX=w-pad;
  const currentY=pad+(h-2*pad)*(maxY-price/days)/Math.max(1,maxY-minY);

  ctx.beginPath();
  ctx.fillStyle="#007aff";
  ctx.arc(currentX,currentY,8,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#222";
  ctx.font="24px -apple-system,BlinkMacSystemFont,sans-serif";
  ctx.fillText(`第 1 天：${money(price)}/天`,pad,34);
  ctx.fillText(`当前：${money(price/days)}/天`,w-260,h-18);

  ctx.fillStyle="#888";
  ctx.font="20px -apple-system,BlinkMacSystemFont,sans-serif";
  ctx.fillText("使用天数",w/2-40,h-12);
}

function openItemModal(){
  $("formTitle").textContent="添加物品";
  $("form").reset();
  $("editId").value="";
  $("itemIcon").value="";
  $("itemBgColor").value="#007aff";
  $("itemBgColorCustom").value="";
  $("buyDate").value=new Date().toISOString().slice(0,10);
  $("paybackTarget").value="";
  $("lifeStatus").value="auto";
  renderCategorySelect();
  renderTagSelector();
  $("newTagInput").value="";

}

function closeItemModal(){
  hideModal("itemModal");
}

function clearItemBgColor(){

  $("itemBgColorCustom").value="";
}

function openCategoryModal(){
  renderCategoryManager();
  showModal("categoryModal");
}

function closeCategoryModal(){

["itemModal","categoryModal","detailModal"].forEach(id=>{
  $(id).addEventListener("click",e=>{
    if(e.target.id===id) hideModal(id);
  });
});

document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    ["itemModal","categoryModal","detailModal"].forEach(id=>hideModal(id));
  }
});

$("form").addEventListener("submit",e=>{
  e.preventDefault();

  const id=$("editId").value || crypto.randomUUID();

  const selectedTags=[...document.querySelectorAll(".tag-chip.active")].map(el=>el.dataset.tag);

  const item={
    id,
    name:$("name").value.trim(),
    category:$("category").value,
    icon:$("itemIcon").value.trim(),
    bgColor:$("itemBgColorCustom").value ? normalizeColor($("itemBgColor").value) : "",
    price:Number($("price").value),
    paybackTarget:Number($("paybackTarget").value || 1),
    lifeStatus:$("lifeStatus").value,
    buyDate:$("buyDate").value,
    endDate:$("endDate").value,
    expireDate:$("expireDate").value,
    note:$("note").value.trim(),
    tags:selectedTags
  };

  const idx=items.findIndex(x=>x.id===id);

  if(idx>=0)items[idx]=item;
  else items.unshift(item);

  saveItems();
  closeItemModal();
  render();
});

function editItem(id){
  const x=items.find(i=>i.id===id);
  if(!x)return;

  $("formTitle").textContent="编辑物品";
  renderCategorySelect();

  $("editId").value=x.id;
  $("name").value=x.name;
  $("category").value=x.category;
  $("itemIcon").value=x.icon || "";
  $("itemBgColor").value=normalizeColor(x.bgColor) || "#007aff";
  $("itemBgColorCustom").value=normalizeColor(x.bgColor) ? "1" : "";
  $("price").value=x.price;
  $("paybackTarget").value=x.paybackTarget || "";
  $("lifeStatus").value=x.lifeStatus || "auto";
  $("buyDate").value=x.buyDate;
  $("endDate").value=x.endDate;
  $("expireDate").value=x.expireDate;
  $("note").value=x.note || "";

  renderTagSelector(x.tags || []);
  $("newTagInput").value="";

  showModal("itemModal");
}

function deleteItem(id){
  if(!confirm("确定删除这个物品吗？"))return;
  items=items.filter(x=>x.id!==id);
  saveItems();
  render();
}

function renderCategoryManager(){
  $("categoryList").innerHTML=categories.map((c,i)=>`
    <div class="category-row">
      <input class="category-icon-input" value="${escapeAttr(getIcon(c))}" data-icon-index="${i}" maxlength="4">
      <input class="category-name-input" value="${escapeAttr(c)}" data-index="${i}">
      <button onclick="deleteCategory(${i})">删除</button>
    </div>
  `).join("");
}

function addCategory(){
  const name=$("newCategory").value.trim();

  if(!name)return alert("请输入分类名称");
  if(categories.includes(name))return alert("这个分类已经存在");

  categories.push(name);
  categoryIcons[name]=icons[name] || "✨";
  $("newCategory").value="";
  renderCategoryManager();
}

function deleteCategory(index){
  const name=categories[index];

  if(categories.length<=1)return alert("至少保留一个分类");
  if(!confirm(`确定删除「${name}」分类吗？该分类下的物品会变为「其他」。`))return;

  categories.splice(index,1);
  delete categoryIcons[name];

  if(!categories.includes("其他"))categories.push("其他");

  items=items.map(item=>{
    if(item.category===name)return {...item,category:"其他"};
    return item;
  });

  if(activeCat===name)activeCat="全部";

  saveItems();
  renderCategoryManager();
}

function saveCategories(){
  const nameInputs=[...document.querySelectorAll("#categoryList input[data-index]")];
  const iconInputs=[...document.querySelectorAll("#categoryList input[data-icon-index]")];
  const oldCategories=[...categories];
  const next=nameInputs.map(i=>i.value.trim()).filter(Boolean);

  if(new Set(next).size!==next.length)return alert("分类名称不能重复");
  if(!next.length)return alert("至少需要一个分类");

  const nextIcons={};
  nameInputs.forEach((input,i)=>{
    const oldName=oldCategories[i];
    const newName=input.value.trim();
    if(!newName)return;
    const icon=(iconInputs[i]?.value || "").trim();
    nextIcons[newName]=icon || categoryIcons[oldName] || icons[newName] || "✨";
  });

  categories=next;
  categoryIcons=nextIcons;

  items=items.map(item=>{
    if(!categories.includes(item.category)){
      return {...item,category:categories.includes("其他")?"其他":categories[0]};
    }
    return item;
  });

  if(activeCat!=="全部" && !categories.includes(activeCat))activeCat="全部";

  saveCats();
  saveItems();
  closeCategoryModal();
  render();
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g,m=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

function escapeAttr(str){
  return String(str).replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

function saveTags(){
  localStorage.setItem(TAG_KEY,JSON.stringify(customTags));
}

function renderTagSelector(selected=[]) {
  const wrap = $("tagSelector");
  if (!wrap) return;

  wrap.innerHTML = customTags.map(tag => `
    <div class="tag-chip ${selected.includes(tag) ? 'active' : ''}" data-tag="${escapeAttr(tag)}">
      <span>${escapeHtml(tag)}</span>
      <button class="tag-remove" type="button" data-remove-tag="${escapeAttr(tag)}">×</button>
    </div>
  `).join("");

  wrap.querySelectorAll(".tag-chip").forEach(el => {
    el.addEventListener("click", e => {
      if (e.target.closest(".tag-remove")) return;
      el.classList.toggle("active");
    });
  });

  wrap.querySelectorAll(".tag-remove").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      removeCustomTag(btn.dataset.removeTag);
    });
  });
}

function removeCustomTag(tag){
  if(!confirm(`确定从标签库删除「${tag}」吗？已保存物品上的历史标签不会被删除。`))return;

  const selected=[...document.querySelectorAll(".tag-chip.active")]
    .map(el=>el.dataset.tag)
    .filter(x=>x!==tag);

  customTags=customTags.filter(x=>x!==tag);
  saveTags();
  renderTagSelector(selected);
}

function addCustomTag(){
  const input=$("newTagInput");
  const value=input.value.trim();

  if(!value)return;

  if(customTags.includes(value)){
    input.value="";
    return;
  }

  customTags.push(value);
  saveTags();

  const selected=[...document.querySelectorAll(".tag-chip.active")]
    .map(el=>el.dataset.tag);

  renderTagSelector(selected);

  input.value="";
}


$("itemBgColor").addEventListener("input",()=>{
  $("itemBgColorCustom").value="1";
});

$("search").addEventListener("input",render);

$("sortSelect").addEventListener("change",e=>{
  sortMode=e.target.value;
  render();
});

function applyTheme(){
  document.documentElement.setAttribute("data-theme",currentTheme);
  document.documentElement.setAttribute("data-style",currentStyle);
  const el=$("themeText");
  if(el){
    el.textContent=currentTheme==="dark" ? "切换浅色模式" : "切换深色模式";
  }
  const styleSelect=$("styleSelect");
  if(styleSelect){
    styleSelect.value=currentStyle;
  }
}

function toggleTheme(){
  currentTheme=currentTheme==="dark" ? "light" : "dark";
  localStorage.setItem(THEME_KEY,currentTheme);
  applyTheme();
  render();
}

function setVisualStyle(style){
  currentStyle=visualStyles.includes(style) ? style : "xhs";
  localStorage.setItem(STYLE_KEY,currentStyle);
  applyTheme();
  render();
}

applyTheme();
applyMobileColumns();
render();

  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js");
  });
}
