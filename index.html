<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>归物集</title>

<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">

<meta name="theme-color" content="#f5f5f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="归物集">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
:root{
  --red:#ff3b30;
  --blue:#007aff;
  --green:#34c759;
  --orange:#ff9500;
  --purple:#af52de;
  --bg:#f5f5f7;
  --text:#1d1d1f;
  --muted:#86868b;
  --shadow:0 10px 30px rgba(0,0,0,.06);
  --card-bg:white;
  --soft-bg:#f6f6f8;
  --border:rgba(0,0,0,.04);
  --soft-text:#555;
  --soft-text-2:#777;
  --line:#ececec;
}

[data-theme="dark"]{
  --bg:#111214;
  --text:#f5f5f7;
  --muted:#a1a1aa;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --card-bg:#1c1c1f;
  --soft-bg:#2a2a2e;
  --border:rgba(255,255,255,.08);
  --soft-text:#d1d1d6;
  --soft-text-2:#a1a1aa;
  --line:#3a3a3f;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-bottom:96px;
  transition:background .25s ease,color .25s ease;
}

body.no-scroll{overflow:hidden}

header{
  position:sticky;
  top:0;
  z-index:10;
  background:color-mix(in srgb, var(--card-bg) 86%, transparent);
  backdrop-filter:blur(18px);
  padding:14px 14px 10px;
  border-bottom:1px solid var(--border);
}

.top{
  max-width:980px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.logo{
  font-size:23px;
  font-weight:900;
  letter-spacing:-.6px;
}

.manage-btn{
  border:none;
  background:#1d1d1f;
  color:white;
  border-radius:999px;
  padding:10px 14px;
  font-weight:700;
}

.toolbar{
  max-width:980px;
  margin:12px auto 0;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
}

.search-wrap{
  position:relative;
  min-width:0;
  width:100%;
}

.search-icon{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:17px;
  font-weight:700;
  line-height:1;
  pointer-events:none;
  z-index:2;
}

.search{
  position:relative;
  z-index:1;
  width:100%;
  border:1px solid var(--border);
  background:color-mix(in srgb, var(--soft-bg) 92%, white);
  color:var(--text);
  -webkit-text-fill-color:var(--text);
  caret-color:var(--blue);
  border-radius:999px;
  padding:12px 16px 12px 42px;
  outline:none;
  line-height:1.2;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.35),
    0 4px 14px rgba(0,0,0,.04);
  transition:
    background .2s ease,
    border-color .2s ease,
    box-shadow .2s ease;
}

.search:focus{
  background:var(--card-bg);
  color:var(--text);
  -webkit-text-fill-color:var(--text);
  border-color:color-mix(in srgb, var(--blue) 38%, var(--border));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.25),
    0 0 0 3px color-mix(in srgb, var(--blue) 18%, transparent),
    0 10px 24px rgba(0,0,0,.08);
}

.search::placeholder{
  color:var(--muted);
}

input.search{
  padding:12px 16px 12px 42px;
  background:color-mix(in srgb, var(--soft-bg) 92%, white);
  color:var(--text);
  -webkit-text-fill-color:var(--text);
}

input.search:focus{
  background:var(--card-bg);
  color:var(--text);
  -webkit-text-fill-color:var(--text);
}

.sort-select{
  border:none;
  background:var(--card-bg);
  border-radius:999px;
  padding:11px 14px;
  outline:none;
  color:var(--text);
  font-size:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.05);
  max-width:160px;
}

.tabs-wrap{
  max-width:980px;
  margin:12px auto 0;
  overflow:auto;
}

.tabs{
  display:flex;
  gap:10px;
  width:max-content;
}

.tab{
  border:none;
  white-space:nowrap;
  background:var(--card-bg);
  color:var(--soft-text);
  border-radius:999px;
  padding:8px 14px;
  box-shadow:0 4px 14px rgba(0,0,0,.04);
}

.tab.active{
  background:#1d1d1f;
  color:white;
}

main{
  max-width:980px;
  margin:auto;
  padding:14px;
}

.page{display:none}
.page.active{display:block}

.hero,
.mine-card,
.dark-card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:28px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}

.hero-title,
.mine-title,
.section-title{
  font-size:21px;
  font-weight:900;
  letter-spacing:-.4px;
  margin-bottom:14px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.stat,
.mine-stat{
  background:var(--soft-bg);
  border:1px solid var(--border);
  border-radius:20px;
  padding:14px;
}

.stat.clickable{
  cursor:pointer;
  transition:transform .18s ease, background .18s ease;
}

.stat.clickable:active{
  transform:scale(.97);
}

.stat.active-filter{
  background:color-mix(in srgb, var(--red) 14%, var(--soft-bg));
}

.stat span,
.mine-stat span{
  display:block;
  color:var(--muted);
  font-size:12px;
}

.stat b,
.mine-stat b{
  display:block;
  margin-top:5px;
  font-size:22px;
  letter-spacing:-.4px;
}

.masonry{
  columns:2 220px;
  column-gap:12px;
}

.card{
  break-inside:avoid;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:22px;
  overflow:hidden;
  box-shadow:var(--shadow);
  cursor:pointer;
  margin:0 0 12px;
}


.card:active{transform:scale(.985)}


.cover{
  min-height:96px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  color:white;
  overflow:hidden;
  position:relative;
  z-index:0;
  transform:translateZ(0);
}

.cover.emoji-cover{
  height:112px;
}

.cover.image-tall{
  height:260px;
}

.cover.image-medium{
  height:210px;
}

.cover.image-short{
  height:160px;
}
.cover.has-image{
  background:var(--soft-bg);
}

.cover img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.lazy-img{
  opacity:0;
  filter:blur(14px);
  transform:scale(1.02);
  transition:opacity .35s ease, filter .35s ease, transform .35s ease;
}

.lazy-img.loaded{
  opacity:1;
  filter:blur(0);
  transform:scale(1);
}

.image-picker{
  border:1px dashed var(--border);
  background:var(--soft-bg);
  border-radius:18px;
  padding:14px;
  text-align:center;
  cursor:pointer;
}

.image-picker-preview{
  width:100%;
  height:150px;
  border-radius:16px;
  object-fit:cover;
  display:none;
  margin-top:10px;
}

.image-picker.has-preview .image-picker-preview{
  display:block;
}

.image-picker-text{
  color:var(--soft-text, #666);
  font-weight:700;
}

.cover-0{background:linear-gradient(135deg,#ff3b30,#ff9f0a)}
.cover-1{background:linear-gradient(135deg,#007aff,#5ac8fa)}
.cover-2{background:linear-gradient(135deg,#34c759,#30d158)}
.cover-3{background:linear-gradient(135deg,#ff9500,#ffd60a)}
.cover-4{background:linear-gradient(135deg,#5856d6,#af52de)}
.cover-5{background:linear-gradient(135deg,#64d2ff,#0a84ff)}
.cover-6{background:linear-gradient(135deg,#8e8e93,#c7c7cc)}

.card-body{
  position:relative;
  z-index:2;
  display:block;
  background:var(--card-bg);
  padding:13px;
  border-top:1px solid var(--border);
}

.name{
  font-weight:800;
  margin-bottom:6px;
  line-height:1.35;
}

.meta{
  color:var(--soft-text-2);
  font-size:12px;
  line-height:1.7;
}

.card-note{
  margin-top:8px;
  color:var(--soft-text);
  font-size:12px;
  line-height:1.6;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.price{
  margin-top:8px;
  font-weight:900;
  color:var(--text);
  letter-spacing:-.2px;
}

.badge{
  display:inline-block;
  margin-top:8px;
  padding:4px 9px;
  border-radius:999px;
  font-size:12px;
}

.value-badge{
  display:inline-block;
  margin-top:8px;
  margin-right:6px;
  padding:4px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
}

.value-super{background:#e8f8ee;color:#16803c}
.value-good{background:#eaf4ff;color:#0066cc}
.value-mid{background:#fff3d8;color:#9a6500}

.value-low{background:#ffe4e8;color:#d7002a}

.tag-list{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:8px;
}

.item-tag{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:4px 10px;
  border-radius:999px;
  background:var(--soft-bg);
  color:var(--soft-text, #555);
  font-size:11px;
  font-weight:800;
}

.tag-input-wrap{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.tag-chip{
  padding:8px 12px;
  border-radius:999px;
  background:var(--soft-bg);
  color:var(--text);
  border:1px solid var(--border);
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  user-select:none;
}

.tag-chip.active{
  background:#111;
  color:white;
}

.life-badge{
  display:inline-block;
  margin-top:8px;
  margin-right:6px;
  padding:4px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
}

.life-active{background:#e8f8ee;color:#16803c}
.life-idle{background:#fff3d8;color:#9a6500}

.life-retired{background:#eeeeef;color:#666}

.payback-box{
  margin-top:10px;
  padding:10px 12px;
  border-radius:16px;
  background:var(--soft-bg);
  border:1px solid var(--border);
}

.payback-label{
  font-size:11px;
  color:var(--soft-text-2);
  margin-bottom:4px;
  font-weight:700;
}

.payback-value{
  font-size:13px;
  font-weight:900;
  color:var(--text);
}

.payback-done{
  color:#16803c;
}

.ok{background:#e8f8ee;color:#16803c}
.warn{background:#fff3d8;color:#9a6500}
.bad{background:#ffe4e8;color:#d7002a}

.actions{
  display:flex;
  gap:8px;
  margin-top:11px;
}

.actions button{
  flex:1;
  border:none;
  border-radius:13px;
  padding:8px;
  background:var(--soft-bg);
  color:var(--text);
}

.actions .delete{color:var(--red)}

.stat-page{
  min-height:calc(100vh - 96px);
  padding-bottom:110px;
}

.stat-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:8px 0 18px;
}

.stat-header h1{
  margin:0;
  font-size:28px;
  letter-spacing:-.7px;
}

.dark-card:nth-of-type(1){
  background:linear-gradient(
    135deg,
    color-mix(in srgb, var(--card-bg) 92%, white),
    color-mix(in srgb, #5ac8fa 12%, var(--card-bg))
  );
}
.dark-card:nth-of-type(2){
  background:linear-gradient(
    135deg,
    color-mix(in srgb, var(--card-bg) 92%, white),
    color-mix(in srgb, #af52de 10%, var(--card-bg))
  );
}
.dark-card:nth-of-type(3){
  background:linear-gradient(
    135deg,
    color-mix(in srgb, var(--card-bg) 92%, white),
    color-mix(in srgb, #34c759 10%, var(--card-bg))
  );
}

.asset-layout{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:18px;
  align-items:center;
}

.donut-wrap{
  position:relative;
  width:240px;
  height:240px;
  margin:auto;
}

.donut-wrap canvas{
  width:240px;
  height:240px;
}

.donut-center{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  pointer-events:none;
}

.donut-center span{
  color:var(--soft-text-2);
  font-size:15px;
}

.donut-center b{
  font-size:24px;
  margin-top:6px;
}

.asset-list{
  display:grid;
  gap:12px;
}

.asset-line{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
}

.asset-name{
  font-weight:800;
  font-size:18px;
}

.asset-count{
  color:var(--soft-text-2);
  font-weight:500;
  margin-left:8px;
}

.asset-money{
  font-size:20px;
  font-weight:900;
}

.progress{
  grid-column:1/3;
  height:7px;
  background:var(--line);
  border-radius:999px;
  overflow:hidden;
}

.progress i{
  display:block;
  height:100%;
  width:0%;
  border-radius:999px;
}

.percent{
  color:var(--soft-text-2);
  text-align:right;
  font-size:14px;
}


.highlight-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.highlight-card{
  background:var(--card-bg);
  border-radius:22px;
  padding:15px;
  box-shadow:var(--shadow);
  cursor:pointer;
  border:1px solid var(--border);
}

.highlight-card span{
  display:block;
  color:var(--soft-text-2);
  font-size:12px;
  margin-bottom:8px;
}

.highlight-card b{
  display:block;
  font-size:18px;
  margin-bottom:6px;
}

.highlight-card em{
  display:block;
  font-style:normal;
  color:var(--blue);
  font-weight:900;
}

.life-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.life-card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:22px;
  padding:15px;
  box-shadow:var(--shadow);
}

.life-card span{
  display:block;
  color:var(--soft-text-2);
  font-size:12px;
  margin-bottom:8px;
}

.life-card b{
  display:block;
  font-size:20px;
  letter-spacing:-.3px;
}

.life-card em{
  display:block;
  margin-top:6px;
  font-style:normal;
  color:var(--soft-text-2);
  font-size:12px;
  font-weight:800;
}
.time-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:14px;
}

.time-card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:22px;
  padding:15px;
  box-shadow:var(--shadow);
}

.time-card span{
  display:block;
  color:var(--soft-text-2);
  font-size:12px;
  margin-bottom:8px;
}

.time-card b{
  display:block;
  font-size:20px;
  letter-spacing:-.3px;
}

.month-bars{
  display:grid;
  gap:12px;
}

.month-row{
  display:grid;
  grid-template-columns:56px 1fr auto;
  align-items:center;
  gap:10px;
}

.month-label{
  color:var(--soft-text);
  font-size:13px;
  font-weight:800;
}

.month-track{
  height:10px;
  background:var(--line);
  border-radius:999px;
  overflow:hidden;
}

.month-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#007aff,#5ac8fa);
  border-radius:999px;
}

.month-money{
  min-width:76px;
  text-align:right;
  font-size:13px;
  color:var(--soft-text);
  font-weight:800;
}

.category-stat-list{
  display:grid;
  gap:12px;
}

.category-stat-item{
  background:var(--card-bg);
  border-radius:22px;
  padding:14px;
  display:grid;
  grid-template-columns:48px 1fr auto;
  gap:12px;
  align-items:center;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  cursor:pointer;
}

.category-icon{
  width:46px;
  height:46px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  line-height:1;
}

.category-name{
  font-size:19px;
  font-weight:900;
}

.category-money{
  font-size:20px;
  font-weight:900;
}

.arrow{
  color:#bbb;
  font-size:28px;
  margin-left:8px;
}

.mine-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.mine-actions{
  display:grid;
}

.list-action{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 4px;
  border-bottom:1px solid var(--line);
  font-weight:700;
  cursor:pointer;
}

.list-action:last-child{
  border-bottom:none;
}

.list-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.list-icon{
  width:42px;
  height:42px;
  border-radius:14px;
  background:var(--soft-bg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:21px;
  line-height:1;
}

.list-arrow{
  color:#bbb;
  font-size:22px;
}

.hidden-file{display:none}

.bottom-nav{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  z-index:20;
  width:min(92vw,520px);
  height:74px;
  background:color-mix(in srgb, var(--card-bg) 88%, transparent);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:38px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  padding:8px;
  box-shadow:0 14px 40px rgba(0,0,0,.14);
}

.nav-item{
  border:none;
  background:transparent;
  color:#8e8e93;
  border-radius:32px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  font-size:12px;
}

.nav-item .ico{
  font-size:24px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

.nav-item.active{
  background:var(--soft-bg);
  color:var(--blue);
}

.fab{
  position:fixed;
  right:20px;
  bottom:108px;
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  background:linear-gradient(135deg,#007aff,#5ac8fa);
  color:white;
  font-size:36px;
  box-shadow:0 12px 30px rgba(0,122,255,.28);
  z-index:21;
}

.fab.hide{display:none}

.modal{
  position:fixed;
  inset:0;
  z-index:30;
  background:rgba(0,0,0,.42);
  padding:18px;
  overflow:auto;
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity .24s ease, visibility .24s ease;
}

.modal.show{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
}

.sheet{
  max-width:540px;
  margin:34px auto;
  background:var(--card-bg);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:28px;
  padding:20px;
  box-shadow:0 20px 60px rgba(0,0,0,.18);
  transform:translateY(28px) scale(.96);
  opacity:0;
  transition:transform .28s cubic-bezier(.2,.8,.2,1), opacity .24s ease;
}

.modal.show .sheet{
  transform:translateY(0) scale(1);
  opacity:1;
}

.sheet h2{margin:4px 0 16px}

.grid{
  display:grid;
  gap:11px;
}

input,select,textarea{
  width:100%;
  border:1px solid var(--border);
  background:var(--soft-bg);
  color:var(--text);
  border-radius:16px;
  padding:13px;
  font-size:15px;
  font-family:inherit;
}

.primary{
  border:none;
  background:linear-gradient(135deg,#007aff,#5ac8fa);
  color:white;
  border-radius:16px;

<script>
const ITEM_KEY="items_xhs_style_v7";
const CAT_KEY="items_categories_v7";
const CAT_ICON_KEY="items_category_icons_v7";
const THEME_KEY="items_theme_v1";

let items=JSON.parse(localStorage.getItem(ITEM_KEY)||"[]");
let categories=JSON.parse(localStorage.getItem(CAT_KEY)||"null") || [
  "电子产品","衣服鞋包","美妆护肤","药品","日用品","书籍","其他"
];
let categoryIcons=JSON.parse(localStorage.getItem(CAT_ICON_KEY)||"null") || {};

let activeCat="全部";
let currentPage="home";
let sortMode="newest";
let expireOnly=false;
let currentTheme=localStorage.getItem(THEME_KEY) || "light";

const colors=["#007aff","#34c759","#ff9500","#af52de","#ff3b30","#64d2ff","#8e8e93"];

const icons={
  "日用品":"🧴",
  "化妆品":"💄",
  "药品":"💊",
  "电子产品":"🖥️",
  "衣物":"👕",
  "衣服鞋包":"👒",
  "书籍":"📚",
  "其他":"🛁",
  "护肤品":"🧼",
  "美妆护肤":"💄",
  "食品":"🍪",
  "文具":"✏️",
  "家居":"🏠",
  "健身":"🏋️"
};

const $=id=>document.getElementById(id);
const today=()=>new Date(new Date().toDateString());
const money=n=>"¥"+Number(n||0).toFixed(2);

function saveItems(){
  localStorage.setItem(ITEM_KEY,JSON.stringify(items));
}

function saveCats(){
  localStorage.setItem(CAT_KEY,JSON.stringify(categories));
  localStorage.setItem(CAT_ICON_KEY,JSON.stringify(categoryIcons));
}

function daysBetween(a,b){
  const d1=new Date(a);
  const d2=b?new Date(b):today();
  return Math.max(1,Math.ceil((d2-d1)/86400000)+1);
}

function expireInfo(date){
  if(!date)return null;
  const diff=Math.ceil((new Date(date)-today())/86400000);
  if(diff<0)return {text:"已过期",cls:"bad"};
  if(diff<=30)return {text:`${diff} 天后过期`,cls:"warn"};
  return {text:"有效期内",cls:"ok"};
}

function valueInfo(item){
  const price=Number(item.price || 0);
  const days=daysBetween(item.buyDate,item.endDate);
  const daily=price / days;

  if(!price)return {text:"未计价",cls:"value-mid",score:0,daily};
  if(daily<=1)return {text:"超值",cls:"value-super",score:4,daily};
  if(daily<=3)return {text:"很值",cls:"value-good",score:3,daily};
  if(daily<=10)return {text:"一般",cls:"value-mid",score:2,daily};
  return {text:"偏贵",cls:"value-low",score:1,daily};
}

function paybackInfo(item){
  const price=Number(item.price || 0);
  const targetDaily=Number(item.paybackTarget || 1);
  const days=daysBetween(item.buyDate,item.endDate);
  const daily=price/days;

  if(price<=0 || targetDaily<=0)return {
    done:false,
    text:"未计价"
  };

  if(daily<=targetDaily){
    return {
      done:true,
      text:`已达成 ¥${targetDaily.toFixed(2)}/天目标`
    };
  }

  const targetDays=Math.ceil(price/targetDaily);
  const remain=Math.max(0,targetDays-days);

  return {
    done:false,
    text:`距离 ¥${targetDaily.toFixed(2)}/天还需 ${remain} 天`
  };
}


function lifeInfo(status){
  if(status==="idle")return {text:"闲置",cls:"life-idle"};
  if(status==="retired")return {text:"已淘汰",cls:"life-retired"};
  return {text:"使用中",cls:"life-active"};
}

function computedLifeInfo(item){
  if(item.lifeStatus && item.lifeStatus!=="auto"){
    return lifeInfo(item.lifeStatus);
  }

  const exp=expireInfo(item.expireDate);
  if(item.endDate || (exp && exp.cls==="bad")){
    return lifeInfo("retired");
  }

  const days=daysBetween(item.buyDate,item.endDate);
  const daily=Number(item.price || 0)/days;

  if(days>=180 && daily>10){
    return lifeInfo("idle");
  }

  return lifeInfo("active");
}

function formatDate(dateStr){
  if(!dateStr)return "—";
  const d=new Date(dateStr);
  if(Number.isNaN(d.getTime()))return dateStr;
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
}

function buildTimeline(item){
  const days=daysBetween(item.buyDate,item.endDate);
  const exp=expireInfo(item.expireDate);
  const life=computedLifeInfo(item);
  const result=[];

  if(item.buyDate){
    result.push({
      title:"购买",
      desc:`${formatDate(item.buyDate)} · 花费 ${money(item.price)}`,
      cls:""
    });
  }

  result.push({
    title:`已使用 ${days} 天`,
    desc:`当前日均成本 ${money(Number(item.price||0)/days)}/天 · 使用价值：${valueInfo(item).text}`,
    cls:""
  });

  if(item.expireDate){
    result.push({
      title:exp && exp.cls==="bad" ? "已过期" : "保质期",
      desc:`${formatDate(item.expireDate)}${exp ? ` · ${exp.text}` : ""}`,
      cls:exp ? exp.cls : ""
    });
  }

  if(item.endDate){
    result.push({
      title:"停止使用",
      desc:`${formatDate(item.endDate)} · 生命周期：${life.text}`,
      cls:"done"
    });
  }else{
    result.push({
      title:"当前状态",
      desc:`生命周期：${life.text}`,
      cls:life.text==="闲置" ? "warn" : life.text==="已淘汰" ? "done" : ""
    });
  }

  return result;
}

function getIcon(cat){
  return categoryIcons[cat] || icons[cat] || "✨";
}

function coverClass(cat){
  return "cover-" + (Math.abs(cat.length) % 7);
}

function imageHeightClass(item){
  if(!item.image)return "emoji-cover";
  const seed=(item.name.length + item.category.length + Math.round(Number(item.price || 0))) % 3;
  if(seed===0)return "image-tall";
  if(seed===1)return "image-medium";
  return "image-short";
}

function sortItems(a,b){
  const priceA=Number(a.price||0);
  const priceB=Number(b.price||0);
  const daysA=daysBetween(a.buyDate,a.endDate);
  const daysB=daysBetween(b.buyDate,b.endDate);
  const dailyA=priceA/daysA;
  const dailyB=priceB/daysB;
  const expireA=a.expireDate ? new Date(a.expireDate).getTime() : Infinity;
  const expireB=b.expireDate ? new Date(b.expireDate).getTime() : Infinity;

  if(sortMode==="oldest") return items.indexOf(a)-items.indexOf(b);
  if(sortMode==="priceDesc") return priceB-priceA;
  if(sortMode==="priceAsc") return priceA-priceB;
  if(sortMode==="dailyDesc") return dailyB-dailyA;
  if(sortMode==="dailyAsc") return dailyA-dailyB;
  if(sortMode==="daysDesc") return daysB-daysA;
  if(sortMode==="daysAsc") return daysA-daysB;
  if(sortMode==="expireAsc") return expireA-expireB;

  return items.indexOf(b)-items.indexOf(a);
}

function showModal(id){
  $(id).classList.add("show");
  document.body.classList.add("no-scroll");
}

function hideModal(id){
  $(id).classList.remove("show");
  setTimeout(()=>{
    const anyOpen=[...document.querySelectorAll(".modal")].some(m=>m.classList.contains("show"));
    if(!anyOpen) document.body.classList.remove("no-scroll");
  },260);
}

function switchPage(page){
  currentPage=page;

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));

  if(page==="home"){

function getCategoryStats(){
  const total=items.reduce((s,x)=>s+Number(x.price||0),0);

  return categories.map((cat,index)=>{
    const list=items.filter(x=>x.category===cat);
    const amount=list.reduce((s,x)=>s+Number(x.price||0),0);
    const percent=total ? amount/total*100 : 0;

    return {
      cat,
      count:list.length,
      amount,
      percent,
      color:colors[index % colors.length]
    };
  }).filter(x=>x.count>0 || x.amount>0)
    .sort((a,b)=>b.amount-a.amount);
}


function renderHighlightItems(){
  if(!items.length){
    $("highlightItems").innerHTML=`<div style="color:#888">暂无数据</div>`;
    return;
  }

  const sortedByPrice=[...items].sort((a,b)=>Number(b.price||0)-Number(a.price||0));

  const sortedByDaily=[...items].sort((a,b)=>{
    const dailyA=Number(a.price||0)/daysBetween(a.buyDate,a.endDate);
    const dailyB=Number(b.price||0)/daysBetween(b.buyDate,b.endDate);
    return dailyB-dailyA;
  });

  const sortedByValue=[...items].sort((a,b)=>{
    const dailyA=Number(a.price||0)/daysBetween(a.buyDate,a.endDate);
    const dailyB=Number(b.price||0)/daysBetween(b.buyDate,b.endDate);
    return dailyA-dailyB;
  });

  const mostExpensive=sortedByPrice[0];
  const highestDaily=sortedByDaily[0];
  const bestValue=sortedByValue[0];

  const cards=[
    {
      title:"最贵物品",
      item:mostExpensive,
      value:money(mostExpensive.price)
    },
    {
      title:"日均最高",
      item:highestDaily,
      value:money(highestDaily.price/daysBetween(highestDaily.buyDate,highestDaily.endDate))+"/天"
    },
    {
      title:"最值物品",
      item:bestValue,
      value:money(bestValue.price/daysBetween(bestValue.buyDate,bestValue.endDate))+"/天"
    }
  ];

  $("highlightItems").innerHTML=cards.map(card=>`
    <div class="highlight-card" onclick="openDetailModal('${card.item.id}')">
      <span>${card.title}</span>
      <b>${getIcon(card.item.category)} ${escapeHtml(card.item.name)}</b>
      <em>${card.value}</em>
    </div>
  `).join("");
}

function renderTimeStats(){
  const monthSpendEl=$("monthSpend");
  const recentSpendEl=$("recentSpend");
  const yearSpendEl=$("yearSpend");
  const monthBarsEl=$("monthBars");
  if(!monthSpendEl || !recentSpendEl || !yearSpendEl || !monthBarsEl)return;

  const now=today();
  const year=now.getFullYear();
  const month=now.getMonth();
  const monthStart=new Date(year,month,1);
  const yearStart=new Date(year,0,1);
  const recentStart=new Date(now);
  recentStart.setDate(recentStart.getDate()-29);

  const amountAfter=start=>items.reduce((sum,item)=>{
    if(!item.buyDate)return sum;
    const d=new Date(item.buyDate);
    return d>=start ? sum+Number(item.price||0) : sum;
  },0);

  monthSpendEl.textContent=money(amountAfter(monthStart));
  recentSpendEl.textContent=money(amountAfter(recentStart));
  yearSpendEl.textContent=money(amountAfter(yearStart));

  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(year,month-i,1);
    const y=d.getFullYear();
    const m=d.getMonth();
    const label=`${m+1}月`;
    const amount=items.reduce((sum,item)=>{
      if(!item.buyDate)return sum;
      const bd=new Date(item.buyDate);
      return bd.getFullYear()===y && bd.getMonth()===m ? sum+Number(item.price||0) : sum;
    },0);
    months.push({label,amount});
  }

  const max=Math.max(...months.map(x=>x.amount),1);

  monthBarsEl.innerHTML=months.map(x=>`
    <div class="month-row">
      <div class="month-label">${x.label}</div>
      <div class="month-track"><div class="month-fill" style="width:${Math.max(4,x.amount/max*100)}%"></div></div>
      <div class="month-money">${money(x.amount)}</div>
    </div>
  `).join("");
}

function drawDonut(stats,total){
  const canvas=$("donutCanvas");
  if(!canvas)return;

  const ctx=canvas.getContext("2d");
  const w=canvas.width;
  const h=canvas.height;
  const cx=w/2;
  const cy=h/2;
  const radius=170;
  const lineWidth=70;

  ctx.clearRect(0,0,w,h);
  ctx.lineWidth=lineWidth;
  ctx.lineCap="butt";

  if(!total){
    ctx.beginPath();
    ctx.strokeStyle="#ececec";
    ctx.arc(cx,cy,radius,0,Math.PI*2);
    ctx.stroke();
    return;
  }

  let start=-Math.PI/2;

  stats.forEach(s=>{
    const angle=Math.PI*2*(s.amount/total);
    ctx.beginPath();
    ctx.strokeStyle=s.color;
    ctx.arc(cx,cy,radius,start,start+angle);
    ctx.stroke();
    start+=angle;
  });
}

function downloadFile(filename,content,type){
  const blob=new Blob([content],{type});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

    version:1,
    exportedAt:new Date().toISOString(),

function exportCSV(){
  const rows=[["名称","分类","价格","购买日期","停止使用日期","保质期","使用天数","当前日均成本"]];

  items.forEach(item=>{
    const days=daysBetween(item.buyDate,item.endDate);
    rows.push([
      item.name,
      item.category,
      item.price,
      item.buyDate,
      item.endDate,
      item.expireDate,
      days,
      (item.price/days).toFixed(2)
    ]);
  });

  const csv=rows.map(row=>row.map(v=>`"${String(v ?? "").replaceAll('"','""')}"`).join(",")).join("\n");
  downloadFile("我的物品记录.csv","\ufeff"+csv,"text/csv;charset=utf-8");
}

function importBackup(event){
  const file=event.target.files[0];
  if(!file)return;

  const reader=new FileReader();

  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);

      if(!Array.isArray(data.items) || !Array.isArray(data.categories)){
        alert("备份文件格式不正确");
        return;
      }

      if(!confirm("导入后会覆盖当前数据，确定继续吗？"))return;

      items=data.items;
      categories=data.categories;
      categoryIcons=data.categoryIcons || {};
      activeCat="全部";

      saveItems();
      saveCats();
      render();
      renderMinePage();

      alert("导入成功");
    }catch(e){
      alert("导入失败，请检查 JSON 文件");
    }finally{
      event.target.value="";
    }
  };

  reader.readAsText(file);
}

function drawCostChart(price,days){
  const canvas=$("costChart");
  if(!canvas)return;

  const ctx=canvas.getContext("2d");
  const w=canvas.width;
  const h=canvas.height;
  const pad=54;

  ctx.clearRect(0,0,w,h);

  const maxY=price;
  const minY=price/days;

  ctx.lineWidth=2;
  ctx.strokeStyle="#e5e5e5";

  for(let i=0;i<=4;i++){
    const y=pad+(h-2*pad)*i/4;
    ctx.beginPath();
    ctx.moveTo(pad,y);
    ctx.lineTo(w-pad,y);
    ctx.stroke();
  }

  ctx.strokeStyle="#007aff";
  ctx.lineWidth=5;
  ctx.beginPath();

  for(let d=1;d<=days;d++){
    const x=pad+(w-2*pad)*(d-1)/Math.max(1,days-1);
    const value=price/d;
    const y=pad+(h-2*pad)*(maxY-value)/Math.max(1,maxY-minY);

    if(d===1)ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }

  ctx.stroke();

  const currentX=w-pad;
  const currentY=pad+(h-2*pad)*(maxY-price/days)/Math.max(1,maxY-minY);

  ctx.beginPath();
  ctx.fillStyle="#007aff";
  ctx.arc(currentX,currentY,8,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#222";
  ctx.font="24px -apple-system,BlinkMacSystemFont,sans-serif";
  ctx.fillText(`第 1 天：${money(price)}/天`,pad,34);
  ctx.fillText(`当前：${money(price/days)}/天`,w-260,h-18);

  ctx.fillStyle="#888";
  ctx.font="20px -apple-system,BlinkMacSystemFont,sans-serif";
  ctx.fillText("使用天数",w/2-40,h-12);
}

}

function renderCategoryManager(){
  $("categoryList").innerHTML=categories.map((c,i)=>`
    <div class="category-row">
      <input class="category-icon-input" value="${escapeAttr(getIcon(c))}" data-icon-index="${i}" maxlength="4">
      <input class="category-name-input" value="${escapeAttr(c)}" data-index="${i}">
      <button onclick="deleteCategory(${i})">删除</button>
    </div>
  `).join("");
}

function addCategory(){
  const name=$("newCategory").value.trim();

  if(!name)return alert("请输入分类名称");
  if(categories.includes(name))return alert("这个分类已经存在");

  categories.push(name);
  categoryIcons[name]=icons[name] || "✨";
  $("newCategory").value="";
  renderCategoryManager();
}

function deleteCategory(index){
  const name=categories[index];

  if(categories.length<=1)return alert("至少保留一个分类");
  if(!confirm(`确定删除「${name}」分类吗？该分类下的物品会变为「其他」。`))return;

  categories.splice(index,1);
  delete categoryIcons[name];

  if(!categories.includes("其他"))categories.push("其他");

  items=items.map(item=>{
    if(item.category===name)return {...item,category:"其他"};
    return item;
  });

  if(activeCat===name)activeCat="全部";

  saveItems();
  renderCategoryManager();
}

function saveCategories(){
  const nameInputs=[...document.querySelectorAll("#categoryList input[data-index]")];
  const iconInputs=[...document.querySelectorAll("#categoryList input[data-icon-index]")];
  const oldCategories=[...categories];
  const next=nameInputs.map(i=>i.value.trim()).filter(Boolean);

  if(new Set(next).size!==next.length)return alert("分类名称不能重复");
  if(!next.length)return alert("至少需要一个分类");

  const nextIcons={};
  nameInputs.forEach((input,i)=>{
    const oldName=oldCategories[i];
    const newName=input.value.trim();
    if(!newName)return;
    const icon=(iconInputs[i]?.value || "").trim();
    nextIcons[newName]=icon || categoryIcons[oldName] || icons[newName] || "✨";
  });

  categories=next;
  categoryIcons=nextIcons;

  items=items.map(item=>{
    if(!categories.includes(item.category)){
      return {...item,category:categories.includes("其他")?"其他":categories[0]};
    }
    return item;
  });

  if(activeCat!=="全部" && !categories.includes(activeCat))activeCat="全部";

  saveCats();
  saveItems();
  closeCategoryModal();
  render();
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g,m=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}

function escapeAttr(str){
  return String(str).replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

function hydrateLoadedImages(){
  document.querySelectorAll("img.lazy-img").forEach(img=>{
    if(img.complete) img.classList.add("loaded");
  });
}

document.querySelectorAll(".tag-chip").forEach(el=>{
  el.addEventListener("click",()=>{
    el.classList.toggle("active");
  });
});

$("imageInput").addEventListener("change",e=>{
  const file=e.target.files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=()=>{
    $("imageData").value=reader.result;
    $("imagePreview").src=reader.result;
    $("imagePicker").classList.add("has-preview");
  };
  reader.readAsDataURL(file);
});

$("search").addEventListener("input",render);

$("sortSelect").addEventListener("change",e=>{
  sortMode=e.target.value;
  render();
});

function applyTheme(){
  document.documentElement.setAttribute("data-theme",currentTheme);
  const el=$("themeText");
  if(el){
    el.textContent=currentTheme==="dark" ? "切换浅色模式" : "切换深色模式";
  }
}

function toggleTheme(){
  currentTheme=currentTheme==="dark" ? "light" : "dark";
  localStorage.setItem(THEME_KEY,currentTheme);
  applyTheme();
}

applyTheme();
render();

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>
</body>
</html>
